<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

    <!-- 🎵 Background Music -->
    <audio id="bgMusic" loop preload="auto">
        <source src="InShot_20260301_211700761.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Mute Button -->
    <button id="muteBtn" class="mute-btn">🎵</button>

    <!-- Floating hearts container -->
    <div id="hearts-container"></div>

    <!-- Page 1: Loading Screen -->
    <section id="loading-page" class="page active">
        <div class="glass-card loading-card">
            <h1 class="gradient-text">Cuteness Overloaded Loading...</h1>
            <div class="bunny-container bounce">
                🐰
            </div>
            <p id="loading-subtext" class="subtext">Loading Love...</p>
            <div class="loading-bar-container">
                <div class="loading-bar"></div>
            </div>
        </div>
    </section>

    <!-- Page 2: Welcome Page -->
    <section id="welcome-page" class="page hidden">
        <div class="glass-card">
            <div class="bunny-container float">
                🐰🌹
            </div>
            <h1 id="welcome-text" class="typewriter-text"></h1>
            <p id="welcome-subtext" class="hidden soft-text">
                I made something special just for you...
            </p>
            <button id="btn-continue" class="primary-btn glow-pulse hidden">
                Click to Continue 💌
            </button>
        </div>
    </section>

    <!-- Page 3: Interactive Love Questions -->
    <section id="question-page" class="page hidden">

        <!-- Q1 -->
        <div id="q1" class="glass-card question-card active">
            <h2>Do you love me?</h2>
            <div class="btn-group">
                <button class="primary-btn q1-yes glow-pulse">Yes 💖</button>
                <button class="primary-btn q1-yes glow-pulse">Of course 😘</button>
            </div>
        </div>

        <!-- Q2 -->
        <div id="q2" class="glass-card question-card hidden">
            <h2>Will you be my Valentine?</h2>
            <div class="btn-group relative-group">
                <button class="primary-btn q2-yes glow-pulse">Yes 😍</button>
                <button id="btn-no" class="secondary-btn">No 😢</button>
            </div>

            <button class="primary-btn q2-obviously glow-pulse hidden" style="margin-top: 20px;">
                Obviously 🥰
            </button>
        </div>

    </section>

    <!-- Page 4: Magical Bunny Proposal -->
    <section id="proposal-page" class="page hidden">
        <div class="glass-card proposal-card">
            <div class="bunny-couple slide-up">
                🐰💍🐰
            </div>

            <h1 class="fade-in-text">You make my world beautiful 🌍</h1>
            <h2 class="fade-in-text delay-1">Will you be mine forever?</h2>

            <div class="btn-group fade-in-text delay-2">
                <button class="primary-btn final-yes glow-pulse">Yes 💘</button>
                <button class="primary-btn final-yes glow-pulse">Always ❤️</button>
            </div>
        </div>
    </section>

    <!-- Page 5: Final Celebration -->
    <section id="celebration-page" class="page hidden">
        <div class="glass-card celebration-card">
            <h1 class="scale-text gradient-text">Yaaay 💕</h1>
            <h2 class="scale-text delay-1">I Love You So Much ❤️</h2>
            <h3 class="scale-text delay-2">Happy Valentine’s Day 🥰</h3>

            <div class="bunny-jump">
                🐰❤️🐰
            </div>

            <div class="love-meter-container fade-in-text delay-2">
                <p>Love Meter</p>
                <div class="love-meter">
                    <div class="love-fill"></div>
                </div>
                <p class="love-percent">1000%</p>
            </div>
        </div>
    </section>

    <!-- Main Script -->
    <script src="script.js"></script>

</body>
</html>
